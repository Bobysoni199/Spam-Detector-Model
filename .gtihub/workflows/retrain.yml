name: Retrain Spam Detector

on:
  push:
    branches:
      - main
    paths:
      - 'src/**'
      - 'pipeline/**'

  schedule:
    - cron: '0 9 * * 1'

  workflow_dispatch:
    inputs:
      normal_count:
        description: 'Number of normal transactions'
        required: false
        default: '700'
      spam_count:
        description: 'Number of spam transactions'
        required: false
        default: '300'

jobs:
  retrain:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install packages
        run: |
          pip install azure-ai-ml azure-identity azure-mgmt-storage dvc[azure] pandas scikit-learn joblib mlflow

      # login using client id + secret directly
      - name: Login to Azure
        uses: azure/login@v1
        with:
          client-id:       ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id:       ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Setup DVC remote
        run: |
          dvc remote modify --local azureblob account_name ${{ secrets.STORAGE_ACCOUNT_NAME }}
          dvc remote modify --local azureblob account_key  ${{ secrets.STORAGE_ACCOUNT_KEY }}

      - name: Run Azure ML Pipeline
        run: python3 pipeline/pipeline.py
        env:
          AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          AZURE_RESOURCE_GROUP:  ${{ secrets.AZURE_RESOURCE_GROUP }}
          AZURE_WORKSPACE:       ${{ secrets.AZURE_WORKSPACE }}

      - name: Success
        if: success()
        run: echo "✅ Retrain complete! New model deployed."

      - name: Failed
        if: failure()
        run: echo "❌ Pipeline failed! Check Azure ML Studio."